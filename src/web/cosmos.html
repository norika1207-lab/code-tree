<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cosmos Tree</title>
<style>
  :root { --neon:#4dffb0; --amber:#ffcf4d; --red:#ff6b81; --ink:#9fb0c6; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; }
  body { font-family:-apple-system,"PingFang TC","Helvetica Neue",system-ui,sans-serif; color:#eaf1fb; background:#060a12; }

  /* Night sky background */
  #sky { position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(1100px 760px at 70% 12%, #122138 0%, rgba(18,33,56,0) 60%),
      radial-gradient(900px 700px at 20% 95%, #0d1f1a 0%, rgba(13,31,26,0) 55%),
      linear-gradient(180deg, #070c16 0%, #060a12 60%, #04070d 100%); }
  #stars { position:fixed; inset:0; z-index:0; opacity:.5; }
  svg#tree { position:fixed; inset:0; z-index:1; display:block; cursor:grab; width:100%; height:100%; }
  svg#tree:active { cursor:grabbing; }

  .panel { position:fixed; z-index:5; background:rgba(11,17,28,.55);
    border:1px solid rgba(120,160,220,.18); border-radius:16px;
    backdrop-filter:blur(18px) saturate(140%); -webkit-backdrop-filter:blur(18px) saturate(140%);
    box-shadow:0 10px 40px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.06); }

  #hud { top:22px; left:22px; padding:16px 20px; min-width:280px; }
  #hud .brand { display:flex; align-items:center; gap:9px; font-size:12px; letter-spacing:2px; text-transform:uppercase; color:var(--ink); }
  #hud .brand .dot { width:9px; height:9px; border-radius:50%; background:var(--neon); box-shadow:0 0 14px var(--neon); animation:beat 1.6s ease-in-out infinite; }
  @keyframes beat { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.65)} }
  #hud .label { margin-top:13px; font-size:11px; letter-spacing:1px; color:var(--ink); opacity:.6; }
  #hud .file { margin-top:4px; font-size:19px; font-weight:650; color:#fff; word-break:break-all; text-shadow:0 0 20px rgba(77,255,176,.35); }
  #hud .file.idle { color:#6b7689; text-shadow:none; }
  #hud .meta { margin-top:8px; font-size:12px; color:var(--ink); opacity:.8; }
  #hud .meta b { color:#fff; }

  #legend { bottom:22px; left:22px; padding:12px 15px; display:flex; flex-direction:column; gap:7px; }
  #legend .row { display:flex; align-items:center; gap:9px; font-size:12px; color:var(--ink); }
  #legend .sw { width:11px; height:11px; border-radius:50%; }

  #conn { top:22px; right:22px; padding:8px 13px; font-size:12px; display:flex; align-items:center; gap:8px; }
  #conn .dot { width:8px; height:8px; border-radius:50%; background:#ff6b81; box-shadow:0 0 10px #ff6b81; }
  #conn.on .dot { background:var(--neon); box-shadow:0 0 10px var(--neon); }

  /* Leaf labels */
  .nlabel { font-size:11px; fill:#d4e4d8; paint-order:stroke; stroke:#060a12; stroke-width:3px; stroke-linejoin:round; pointer-events:none; }
  .nlabel.active { fill:#fff; font-weight:700; font-size:12.5px; }
  .dlabel { font-size:10px; fill:#9a8a6f; paint-order:stroke; stroke:#060a12; stroke-width:2.5px; pointer-events:none; }
  .rootlabel { font-size:13px; font-weight:700; fill:#e7c79a; letter-spacing:1px; paint-order:stroke; stroke:#060a12; stroke-width:3px; pointer-events:none; }
  /* Collapsed file: a small glowing leaf dot; click it to expand into a card */
  .dotc { cursor:pointer; }
  .dotlabel { font-size:10px; fill:#9fb4d6; paint-order:stroke; stroke:#060a12; stroke-width:2.5px; pointer-events:none; }

  /* File = a code-editor window tile */
  .fcard { width:210px; height:152px; border-radius:9px; overflow:hidden; cursor:pointer;
    background:rgba(18,26,42,.98); border:1.5px solid rgba(150,185,235,.55);
    box-shadow:0 10px 30px rgba(0,0,0,.55), 0 0 0 1px rgba(150,185,235,.12); display:flex; flex-direction:column;
    transition:border-color .18s, box-shadow .18s, transform .18s; }
  .fcard:hover { border-color:#8fd9ff; box-shadow:0 12px 36px rgba(0,0,0,.62); transform:translateY(-2px); }
  /* a label row, not a window title bar: no solid chrome, blends into the card */
  .fcard .hd { display:flex; align-items:center; gap:7px; padding:7px 10px 5px; flex:0 0 auto;
    font:600 11px/1.3 "SF Mono",ui-monospace,Menlo,monospace; color:#cfe0ff; }
  /* one status dot, color = real state (not decorative window buttons): gray idle, amber editing/changed, red anomaly */
  .fcard .hd .st { width:7px; height:7px; border-radius:50%; flex:0 0 auto; background:#3a4860; }
  .fcard.active .st { background:var(--neon); box-shadow:0 0 8px var(--neon); }
  .fcard.modified .st { background:var(--amber); box-shadow:0 0 7px var(--amber); }
  .fcard.error .st { background:var(--red); box-shadow:0 0 8px var(--red); }
  .fcard .hd .nm { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .fcard .hd .badge { margin-left:auto; flex:0 0 auto; font-size:9px; font-weight:700;
    padding:1px 6px; border-radius:5px; white-space:nowrap; }
  .fcard .bd { flex:1; overflow:hidden; padding:7px 10px; margin:0;
    font:9px/1.44 "SF Mono",ui-monospace,Menlo,monospace; color:#93a9c8; white-space:pre; }
  .fcard.active { border-color:var(--neon); box-shadow:0 0 0 2px var(--neon),0 0 36px rgba(77,255,176,.45); }
  .fcard.active .badge { background:var(--neon); color:#04130c; }
  .fcard.modified { border-color:var(--amber); }
  .fcard.modified .badge { background:var(--amber); color:#241a02; }
  .fcard.error { border-color:var(--red); box-shadow:0 0 0 2px var(--red),0 0 30px rgba(255,107,129,.5);
    animation:warn 1s ease-in-out infinite; }
  .fcard.error .badge { background:var(--red); color:#1a0307; }
  @keyframes warn { 0%,100%{box-shadow:0 0 0 2px var(--red),0 0 30px rgba(255,107,129,.5)} 50%{box-shadow:0 0 0 2px var(--red),0 0 46px rgba(255,107,129,.9)} }
  /* Birth order: which file was built first, which came later */
  .fcard .hd .seq { flex:0 0 auto; font-size:10px; font-weight:800; color:#9fb4d6;
    background:rgba(120,160,220,.16); border-radius:5px; padding:1px 6px; letter-spacing:.3px; }
  .fcard.first .hd .seq { background:#d8a24a; color:#1a1205; box-shadow:0 0 12px rgba(216,162,74,.8); }
  /* Blast radius: hover a tile to mark who gets hit if you change it */
  .fcard.epicenter { border-color:#5fd0ff !important; box-shadow:0 0 0 2px #5fd0ff,0 0 30px rgba(95,208,255,.55) !important; }
  .fcard.atrisk { border-color:#ff9d4d !important; box-shadow:0 0 0 2px rgba(255,157,77,.85),0 0 22px rgba(255,157,77,.4) !important; }
  .fcard.faded { opacity:.32 !important; }
  /* Focus is everything (Sourcetrail-style): when a tile is active, unrelated ones fade back so your eye lands on "where you are" */
  .fcard.defocus { opacity:.34; filter:saturate(.55); }
  .dot.defocus { opacity:.3; }
  path.blastline { stroke:#ff9d4d; stroke-width:2.5; fill:none; stroke-opacity:.9; stroke-dasharray:6 5; }
  #blast { left:50%; top:20px; transform:translateX(-50%); padding:9px 16px; font-size:13px;
    color:#ffd0a0; border-color:rgba(255,157,77,.4); display:none; }
  #blast.on { display:block; }

  /* Issue radar: collect every anomaly on the tree into one list; click to fly over and fix it */
  #radar { right:22px; bottom:22px; width:280px; max-height:46vh; padding:0; display:none;
    flex-direction:column; overflow:hidden; }
  #radar.on { display:flex; }
  #radar .rhd { flex:0 0 auto; display:flex; align-items:center; gap:8px; padding:11px 15px;
    font-size:12px; letter-spacing:1px; color:var(--ink); border-bottom:1px solid rgba(120,160,220,.16); }
  #radar .rhd .rdot { width:8px; height:8px; border-radius:50%; background:var(--red);
    box-shadow:0 0 10px var(--red); animation:beat 1.6s ease-in-out infinite; }
  #radar .rhd b { color:#fff; font-weight:700; }
  #radar .rlist { flex:1; overflow-y:auto; padding:6px; display:flex; flex-direction:column; gap:5px; }
  #radar .ritem { cursor:pointer; padding:8px 10px; border-radius:9px; border:1px solid rgba(120,160,220,.14);
    background:rgba(20,28,44,.6); transition:border-color .15s, background .15s; }
  #radar .ritem:hover { border-color:var(--red); background:rgba(40,24,30,.7); }
  #radar .ritem .rname { font:600 12px/1.3 "SF Mono",ui-monospace,Menlo,monospace; color:#fff;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #radar .ritem .rwhy { margin-top:3px; font-size:11px; color:#ffb0bd; }
  #radar .ritem .rdir { font-size:10px; color:var(--ink); opacity:.7; }
  /* hotspot: tiles high in both churn and coupling are the most dangerous, so they sit on top and stand out most */
  #radar .ritem.hot { border-color:rgba(255,157,77,.55); background:rgba(46,28,16,.7); }
  #radar .ritem.hot:hover { border-color:#ff9d4d; }
  #radar .ritem.hot .rname { color:#ffd0a0; }
  #radar .ritem.hot .rwhy { color:#ffc78a; }

  /* Code panel you drop into when entering a tile */
  #cell { position:fixed; inset:0; z-index:20; display:none; flex-direction:column;
    background:rgba(6,10,18,.82); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); }
  #cell.show { display:flex; }
  #cellbar { display:flex; align-items:center; gap:14px; padding:16px 22px; border-bottom:1px solid rgba(120,160,220,.16); }
  #cellbar .back { cursor:pointer; font-size:13px; color:var(--ink); border:1px solid rgba(120,160,220,.25); border-radius:9px; padding:6px 12px; }
  #cellbar .back:hover { color:#fff; border-color:var(--neon); }
  #cellbar .p { font-size:16px; font-weight:650; color:#fff; }
  #cellbar .s { font-size:12px; color:var(--ink); }
  #cellcode { flex:1; overflow:auto; margin:0; padding:20px 24px;
    font:13px/1.6 "SF Mono",ui-monospace,Menlo,monospace; color:#d6e2f2; white-space:pre; tab-size:2; }
  #cellcode .ln { color:#46566c; }
  #cellpreview { flex:1; border:0; width:100%; background:#fff; }
  #cellbar .tabs { margin-left:auto; display:flex; gap:4px; background:rgba(120,160,220,.1); border-radius:9px; padding:3px; }
  #cellbar .tab { cursor:pointer; font-size:12px; color:var(--ink); border-radius:7px; padding:5px 12px; user-select:none; }
  #cellbar .tab.on { background:var(--neon); color:#04130c; font-weight:650; }
  #cellbar .tab[hidden] { display:none; }
</style>
</head>
<body>
  <div id="sky"></div>
  <canvas id="stars"></canvas>
  <svg id="tree"></svg>

  <div id="hud" class="panel">
    <div class="brand"><span class="dot"></span> Cosmos Tree</div>
    <div class="label">Now editing</div>
    <div class="file idle" id="curFile">Not started yet</div>
    <div class="meta" id="curMeta">Each block is a file, each line is a dependency between files. Touch a file and it lights up here. Click any block to see its code.</div>
  </div>

  <div id="legend" class="panel">
    <div class="row"><span class="sw" style="background:#4dffb0;box-shadow:0 0 8px #4dffb0"></span> Active now</div>
    <div class="row"><span class="sw" style="background:#ffcf4d"></span> Modified</div>
    <div class="row"><span class="sw" style="background:#ff6b81"></span> Repeated edits · anomaly</div>
    <div class="row"><span class="sw" style="background:#86b8a0"></span> Untouched</div>
  </div>

  <div id="conn" class="panel"><span class="dot"></span><span id="connText">Connecting…</span></div>
  <div id="blast" class="panel"></div>

  <div id="radar" class="panel">
    <div class="rhd"><span class="rdot"></span>Issue radar · <b id="radarCount">0</b> to review</div>
    <div class="rlist" id="radarList"></div>
  </div>

  <div id="cell">
    <div id="cellbar">
      <span class="back" id="cellBack">← Back to tree</span>
      <span class="p" id="cellPath"></span>
      <span class="s" id="cellStat"></span>
      <span class="tabs" id="cellTabs">
        <span class="tab on" id="tabCode">Code</span>
        <span class="tab" id="tabPrev" hidden>Preview</span>
      </span>
    </div>
    <pre id="cellcode"></pre>
    <iframe id="cellpreview" hidden></iframe>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script>
  const WS_PORT = window.__WS_PORT__ || 7778;
  // Use a glowing sage green for idle so untouched files look like leaves, not black dots
  const COLOR = { idle:'#86b8a0', active:'#4dffb0', modified:'#ffcf4d', error:'#ff6b81' };
  let projectName = 'Project';

  // ── Starfield background ──
  (function stars(){
    const c=document.getElementById('stars'), x=c.getContext('2d');
    function draw(){ c.width=innerWidth; c.height=innerHeight; x.clearRect(0,0,c.width,c.height);
      for(let i=0;i<160;i++){ const r=Math.random()*1.3; x.globalAlpha=Math.random()*.6+.2;
        x.fillStyle='#cfe0ff'; x.beginPath(); x.arc(Math.random()*c.width,Math.random()*c.height,r,0,7); x.fill(); } }
    draw(); addEventListener('resize',draw);
  })();

  const TRUNK = 168;       // Trunk length from ground to the first fork: a clear trunk first, then branches
  const CARD_W = 210, CARD_H = 152;   // Size of each file = a code-editor window tile
  const svg = d3.select('#tree');
  const scene = svg.append('g');
  const gTrunk = scene.append('g');
  const gLinks = scene.append('g');
  const gBlast = scene.append('g');   // Blast radius: dependency lines drawn on hover (above branches, below cards)
  const gDots = scene.append('g');    // Large repos: files outside the focus collapse into small dots so thousands of cards don't overflow
  const gNodes = scene.append('g');
  const gFlow = scene.append('g');    // Switch glow ball: flows from the previous tile to this one along the line, drawn on the topmost layer

  // Glow filter
  const defs = svg.append('defs');
  const glow = defs.append('filter').attr('id','leafglow').attr('x','-80%').attr('y','-80%').attr('width','260%').attr('height','260%');
  glow.append('feGaussianBlur').attr('stdDeviation','3').attr('result','b');
  const fm = glow.append('feMerge'); fm.append('feMergeNode').attr('in','b'); fm.append('feMergeNode').attr('in','SourceGraphic');

  let activePath=null, userMoved=false, lastLeafCount=-1, curScale=1;
  const posByPath=new Map(), cellByPath=new Map();

  // ── Level of detail (LOD): small projects expand every file into a card; large repos expand only the focus area + hotspots and collapse the rest into dots ──
  // Why: a real repo has thousands of files; drawing a 210px card for each would overflow and nobody could take it all in.
  // What you actually care about is always "where you are now, where you just were, who cascades" — expand those; collapse the distant ones into leaves.
  const LOD_THRESHOLD = 40;        // Only start collapsing once the file count exceeds this
  const RECENT_KEEP = 6;           // Keep the few most recently visited tiles as cards
  const recent = [];               // Recently active paths (the trail, newest first)
  const manualExpand = new Set();  // Dots clicked open by hand → pinned as cards

  const zoom = d3.zoom().scaleExtent([0.12,4]).on('zoom', e => {
    scene.attr('transform', e.transform);
    if(e.sourceEvent) userMoved=true;   // Only flag manual panning; programmatic centering doesn't count
  });
  svg.call(zoom).on('dblclick.zoom', null);

  function statusColor(c){
    if(c.anomaly==='repeat' || c.status==='error') return COLOR.error;
    if(c.status==='modified') return COLOR.modified;
    if(c.status==='active') return COLOR.active;
    return COLOR.idle;
  }

  function keyOf(d){
    return d.data.cell ? ('f:'+d.data.cell.path)
      : ('d:'+d.data.name+'@'+d.depth+'_'+(d.parent?d.parent.data.name:'root'));
  }

  // Card state: red (anomaly) > green (AI working in this tile) > amber (edited this round)
  function cardState(c){
    if(c.anomaly==='repeat' || c.status==='error' || c.anomaly==='stall') return ' error';
    if(c.path===activePath || c.status==='active') return ' active';
    if(c.status==='modified' || c.modification_count) return ' modified';
    return '';
  }
  // Badge text only for things that need your attention. Normal active/modified state is already
  // carried by the border + the status dot, so don't repeat it as text (calm by default, loud on event).
  function cardBadge(c){
    if(c.anomaly==='repeat') return '⚠ Repeated '+(c.modification_count||'');
    if(c.anomaly==='stall') return '⚠ Stalled';
    if(c.status==='error') return '⚠ Error';
    return '';
  }
  // The real code shown inside each tile (fetch /file, cache it; when the file changes, force a re-fetch)
  const contentByPath=new Map();
  function fetchContent(p, cb){
    fetch('/file?path='+encodeURIComponent(p)).then(r=>r.text()).then(t=>{ contentByPath.set(p,t); cb&&cb(t); }).catch(()=>{});
  }
  function clip(t){ return (t||'').replace(/\t/g,'  ').split('\n').slice(0,16).join('\n'); }

  function buildHierarchy(cells, rootName){
    const root={name:rootName,children:[],dir:true};
    const dirs=new Map([['',root]]);
    for(const c of cells){
      const parts=c.path.split('/'); let cur='', parent=root;
      parts.forEach((part,i)=>{
        const leaf=i===parts.length-1; const key=cur?cur+'/'+part:part;
        if(leaf){ parent.children.push({name:part,cell:c,dir:false}); }
        else { let n=dirs.get(key); if(!n){ n={name:part,children:[],dir:true}; dirs.set(key,n); parent.children.push(n);} parent=n; }
        cur=key;
      });
    }
    return root;
  }

  function branchPath(s,t){
    // Vertical bias: leave the source going nearly straight up, then splay out near the target so it reads like a branch, not a fountain
    const dy=t.y-s.y;
    const c1y=s.y+dy*0.5;
    const c2y=t.y-dy*0.18;
    return `M${s.x},${s.y} C${s.x},${c1y} ${t.x},${c2y} ${t.x},${t.y}`;
  }

  const COL_W = CARD_W + 70;     // Horizontal spacing between cards in the same tier
  const TIER_H = CARD_H + 160;   // Vertical spacing between tiers
  const TIER_GAP = 140;          // Distance from the trunk top to the first tier
  let lastPlaced = null, lastEdges = [];

  // Tier by "functional category": same category, same tier; the more files depend on a category, the lower it sits (closer to the trunk)
  function layout(cells, edges){
    const idToCat = new Map(cells.map(c=>[c.id, c.category||'root']));
    const byCat = new Map();
    for(const c of cells){ const k=c.category||'root'; (byCat.get(k)||byCat.set(k,[]).get(k)).push(c); }
    const imp = new Map(); for(const k of byCat.keys()) imp.set(k,0);
    for(const e of (edges||[])){ const tc=idToCat.get(e.to); if(tc!=null) imp.set(tc,(imp.get(tc)||0)+1); }
    // Tier 0 at the bottom (most foundational / most depended-on); higher up is more peripheral
    const cats = [...byCat.keys()].sort((a,b)=> (imp.get(b)-imp.get(a)) || a.localeCompare(b));
    const order = [...cells].sort((a,b)=>(a.born_at-b.born_at)||(a.born_seq-b.born_seq));
    const oi = new Map(order.map((c,i)=>[c.id,i]));
    const placed=[], catMeta=new Map();
    cats.forEach((cat,ti)=>{
      const arr = byCat.get(cat).slice().sort((a,b)=>(a.born_at-b.born_at)||(a.born_seq-b.born_seq));
      const n=arr.length, y=-(TIER_GAP+ti*TIER_H);
      arr.forEach((c,i)=> placed.push({ cell:c, cat, tier:ti, x:(i-(n-1)/2)*COL_W, y, oi:oi.get(c.id)||0 }));
      catMeta.set(cat, { y, minX:-(n-1)/2*COL_W });
    });
    return { placed, cats, catMeta };
  }

  function render(cells, edges){
    if(!cells || !cells.length) return;
    cellByPath.clear(); posByPath.clear();
    cells.forEach(c=>cellByPath.set(c.path,c));
    if(edges) lastEdges=edges;
    // Dependency graph: who imports whom (edges use absolute paths, posByPath uses relative paths, so build an id→rel map first)
    const relById=new Map(cells.map(c=>[c.id,c.path]));
    depMap=new Map(); // rel(depended-on file) -> Set(files that import it and break if it breaks)
    for(const e of lastEdges){ const f=relById.get(e.from), t=relById.get(e.to);
      if(f&&t){ if(!depMap.has(t)) depMap.set(t,new Set()); depMap.get(t).add(f); } }
    const { placed, cats, catMeta } = layout(cells, lastEdges);
    lastPlaced=placed;
    placed.forEach(p=>posByPath.set(p.cell.path,{x:p.x,y:p.y}));
    // Level of detail: which grow into cards, which collapse into dots
    const exp=buildExpanded(cells);
    const isExp=p=> exp===null || exp.has(p.cell.path);
    const placedCards=placed.filter(isExp);
    const placedDots=placed.filter(p=>!isExp(p));
    const focusSet=focusOf();
    const defocused=path=> activePath && !focusSet.has(path);  // When there's a focus, unrelated tiles fade back
    const topY = Math.min(...placed.map(p=>p.y));
    const maxY = Math.max(...placed.map(p=>p.y));  // Bottom tier (the most core one)
    const yGround = maxY + 64;                      // Origin: just below the bottom tier, no empty tail trailing off

    // ── Origin (seed) → trunk → central spine (threading up through every tier) ──
    // Trunk: a short run from the origin up to the bottom tier, with no dangling tail
    gTrunk.selectAll('path.trunk').data([0]).join(en=>en.append('path').attr('class','trunk'),u=>u,x=>x.remove())
      .attr('d',`M0,${yGround} L0,${maxY}`).attr('fill','none').attr('stroke','#6b4423')
      .attr('stroke-width',26).attr('stroke-linecap','round').attr('stroke-opacity',.97);
    gTrunk.selectAll('path.spine').data([0]).join(en=>en.append('path').attr('class','spine'),u=>u,x=>x.remove())
      .attr('d',`M0,${maxY} L0,${topY}`).attr('fill','none').attr('stroke','#6b4423')
      .attr('stroke-width',11).attr('stroke-linecap','round').attr('stroke-opacity',.82);
    // Seed: the origin of the whole tree, where the earliest code sprouts from
    gTrunk.selectAll('circle.seed').data([0]).join(en=>en.append('circle').attr('class','seed'),u=>u,x=>x.remove())
      .attr('cx',0).attr('cy',yGround).attr('r',9)
      .attr('fill','#d8a24a').attr('stroke','#ffd98a').attr('stroke-width',2)
      .attr('filter','url(#glow)');
    gTrunk.selectAll('text.seedlabel').data([0]).join(en=>en.append('text').attr('class','seedlabel'),u=>u,x=>x.remove())
      .attr('text-anchor','middle').attr('x',0).attr('y',yGround+26)
      .attr('fill','#c9a35e').attr('font-size',12).text('Root');
    // Category name: labeled on the left of each tier
    const cl=gTrunk.selectAll('text.catlabel').data(cats, d=>d);
    cl.exit().remove();
    cl.enter().append('text').attr('class','catlabel').merge(cl)
      .attr('text-anchor','end')
      .attr('x',d=>catMeta.get(d).minX - CARD_W/2 - 28)
      .attr('y',d=>catMeta.get(d).y + 5)
      .text(d=>d);

    // ── Branches: each card grows out from the central spine (just below its tier) ──
    const lk=gLinks.selectAll('path').data(placed, p=>'f:'+p.cell.path);
    lk.exit().remove();
    lk.enter().append('path').merge(lk)
      .attr('d',p=>branchPath({x:0,y:p.y+74},{x:p.x,y:p.y}))
      .attr('fill','none').attr('stroke','#7a512e').attr('stroke-opacity',.9)
      .attr('stroke-linecap','round')
      .attr('stroke-width',p=>Math.max(2, 9 - p.tier*1.4));

    // ── File = code-editor window tile ──
    const nd=gNodes.selectAll('g.node').data(placedCards, p=>'f:'+p.cell.path);
    nd.exit().remove();
    const ent=nd.enter().append('g').attr('class','node');
    const fo=ent.append('foreignObject')
      .attr('width',CARD_W).attr('height',CARD_H)
      .attr('x',-CARD_W/2).attr('y',-CARD_H/2).style('overflow','visible')
      .on('click',(e,p)=>openCell(p.cell.path))
      .on('mouseenter',(e,p)=>highlightBlast(p.cell.path))   // Hover → mark who gets hit if you change this tile
      .on('mouseleave',clearBlast);
    const card=fo.append('xhtml:div').attr('class','fcard')
      // Grow in one by one: stagger the fade-in by birth order
      .style('opacity',0)
      .style('transition',p=>`opacity .5s ease ${(p.oi||0)*55}ms, border-color .18s, box-shadow .18s, transform .18s`);
    const hd=card.append('xhtml:div').attr('class','hd');
    hd.append('xhtml:span').attr('class','seq');   // Birth order number
    hd.append('xhtml:span').attr('class','st');    // one status dot (color carries real state), not fake window controls
    hd.append('xhtml:span').attr('class','nm');
    hd.append('xhtml:span').attr('class','badge');
    card.append('xhtml:pre').attr('class','bd');
    requestAnimationFrame(()=>ent.selectAll('div.fcard').style('opacity',1)); // Trigger the fade-in

    const all=ent.merge(nd);
    all.attr('transform',p=>`translate(${p.x},${p.y})`);
    all.select('div.fcard').attr('class',p=>'fcard'+cardState(p.cell)+(p.oi===0?' first':'')+(defocused(p.cell.path)?' defocus':''));
    all.select('.seq').text(p=>'#'+((p.oi||0)+1));
    all.select('.nm').text(p=>p.cell.path.split('/').pop());
    all.select('.badge').text(p=>cardBadge(p.cell));
    all.select('pre.bd').each(function(p){
      const path=p.cell.path, pre=this;
      if(contentByPath.has(path)) pre.textContent=clip(contentByPath.get(path));
      else { if(!pre.textContent) pre.textContent='…'; fetchContent(path, txt=>{ pre.textContent=clip(txt); }); }
    });

    // ── Collapsed files → small leaf dots (click to pin as a card and open) ──
    const dn=gDots.selectAll('g.dot').data(placedDots, p=>'d:'+p.cell.path);
    dn.exit().remove();
    const den=dn.enter().append('g').attr('class','dot');
    den.append('circle').attr('class','dotc').attr('r',7)
      .on('click',(e,p)=>{ manualExpand.add(p.cell.path);
        const um=userMoved; userMoved=true; render(lastCells); userMoved=um; openCell(p.cell.path); })
      .on('mouseenter',(e,p)=>highlightBlast(p.cell.path))
      .on('mouseleave',clearBlast);
    den.append('text').attr('class','dotlabel').attr('y',20).attr('text-anchor','middle');
    const dall=den.merge(dn);
    dall.attr('class',p=>'dot'+(defocused(p.cell.path)?' defocus':''));
    dall.attr('transform',p=>`translate(${p.x},${p.y})`);
    dall.select('circle.dotc').attr('fill',p=>statusColor(p.cell))
      .attr('stroke','#060a12').attr('stroke-width',1.5)
      .attr('filter',p=>(p.cell.path===activePath||p.cell.status==='active')?'url(#leafglow)':null);
    dall.select('text.dotlabel').text(p=>p.cell.path.split('/').pop());

    if(!userMoved || cells.length!==lastLeafCount){ fitToView(); }
    lastLeafCount=cells.length;
    repaintCards();
    refreshRadar(cells);
  }

  // ── Issue radar: scan out the tiles on the tree actually worth looking at, collected into one list ──
  // The tree "shows" where problems are with color; the radar "lists" them out — click to fly over and open that tile to fix it.
  // This is "turning visualization around to solve dev problems": the structure points things out for you, and you're on the scene in one click.
  //
  // The heart of the ranking: churn × coupling (edit frequency × coupling), the hotspot method validated by CodeScene/Tornhill.
  // Looking at "how many times it changed" alone is noise (normal iteration also edits a lot); the file edited often AND depended on by many
  // is the one that truly cascades on a single change and can break the whole build. Ranking by this keeps the radar from crying wolf.
  const HOT_CHURN = 3, HOT_BLAST = 2;   // Both thresholds must be crossed to count as a hotspot: many edits alone isn't enough, nor is being widely depended on alone
  function radarEntry(c){
    const churn=c.modification_count||0;
    const blast=affectedBy(c.path).size;
    const broken = c.status==='error' || c.anomaly==='repeat';  // core already flagged it as crossing the line
    const stall  = c.anomaly==='stall';
    const hotspot= churn>=HOT_CHURN && blast>=HOT_BLAST;        // churn×coupling hotspot
    if(!broken && !stall && !hotspot) return null;
    // Risk score: severity as the base, plus the churn×blast interaction term (only pushed to the top when both are high)
    const risk = (broken?1000:0) + (stall?600:0) + churn*10 + blast*25 + churn*blast*14;
    let why;
    if(hotspot) why='Edited '+churn+'x and imported by '+blast+' files → one change can cascade';
    else if(broken) why='Edited '+churn+'x, may be stuck looping on this file';
    else if(stall) why='Stalled, no progress here';
    else why='Worth a look';
    return { cell:c, churn, blast, hotspot, broken, stall, why, risk };
  }
  function refreshRadar(cells){
    const probs=[];
    for(const c of (cells||[])){ const e=radarEntry(c); if(e) probs.push(e); }
    probs.sort((a,b)=> b.risk-a.risk);   // Highest risk on top
    const radar=document.getElementById('radar');
    document.getElementById('radarCount').textContent=probs.length;
    radar.classList.toggle('on', probs.length>0);
    const list=document.getElementById('radarList');
    list.textContent='';
    for(const pr of probs){
      const path=pr.cell.path, name=path.split('/').pop();
      const row=document.createElement('div'); row.className='ritem'+(pr.hotspot?' hot':'');
      const n=document.createElement('div'); n.className='rname';
      n.textContent=(pr.hotspot?'[Hotspot] ':'')+name;
      const w=document.createElement('div'); w.className='rwhy'; w.textContent=pr.why;
      row.appendChild(n); row.appendChild(w);
      if(pr.blast){ const d=document.createElement('div'); d.className='rdir';
        d.textContent='Editing it hits '+pr.blast+' files'; row.appendChild(d); }
      row.title=path;
      row.onclick=()=>{ setActive(path); openCell(path); };   // Fly over + open that tile's code
      list.appendChild(row);
    }
  }

  // Old Chrome bug: <foreignObject> often fails to repaint once an ancestor <g> has a transform,
  // leaving cards transparent and invisible. Force-toggle display to make it recompose once.
  function repaintCards(){
    requestAnimationFrame(()=>{
      for(const fo of document.querySelectorAll('foreignObject')){
        const c=fo.firstElementChild; if(!c) continue;
        c.style.display='none'; void c.offsetHeight; c.style.display='';
      }
    });
  }

  // ── Level of detail: compute the set of paths that "should expand into cards" (the rest collapse into dots) ──
  function isHotspot(c){ return (c.modification_count||0)>=HOT_CHURN && affectedBy(c.path).size>=HOT_BLAST; }
  function neighborsOf(path){            // Files directly import-linked to this tile (both directions count)
    const out=new Set();
    for(const d of (depMap.get(path)||[])) out.add(d);          // Who imports it
    for(const [t,froms] of depMap){ if(froms.has(path)) out.add(t); }  // What it imports
    return out;
  }
  function buildExpanded(cells){
    if(cells.length<=LOD_THRESHOLD) return null;   // null = expand all; small projects don't collapse
    const exp=new Set(manualExpand);
    if(activePath){ exp.add(activePath); for(const n of neighborsOf(activePath)) exp.add(n); }
    for(let i=0;i<recent.length && i<RECENT_KEEP;i++) exp.add(recent[i]);
    // Hotspots and anomalies always expand: those are what you should watch most
    for(const c of cells) if(isHotspot(c) || c.anomaly==='repeat' || c.anomaly==='stall' || c.status==='error') exp.add(c.path);
    // Not started yet (no focus, no anomaly) → expand the earliest-born few tiles as a front by default, so the first look isn't a field of empty dots
    if(exp.size===0){
      const seed=[...cells].sort((a,b)=>(a.born_at-b.born_at)||(a.born_seq-b.born_seq)).slice(0,6);
      for(const c of seed) exp.add(c.path);
    }
    return exp;
  }
  // Focus ring: the active tile + its direct links + the recent trail. Everything else fades back.
  function focusOf(){
    const f=new Set();
    if(activePath){ f.add(activePath); for(const n of neighborsOf(activePath)) f.add(n);
      for(let i=0;i<recent.length && i<RECENT_KEEP;i++) f.add(recent[i]); }
    return f;
  }

  // ── Blast radius: change one tile → which tiles get hit ──
  let depMap=new Map();
  // Change the start tile, and every file that "directly or indirectly imports it" may break too
  function affectedBy(start){
    const seen=new Set(), q=[start];
    while(q.length){ const cur=q.shift();
      for(const d of (depMap.get(cur)||[])){ if(!seen.has(d)){ seen.add(d); q.push(d); } } }
    return seen;
  }
  function highlightBlast(path){
    const aff=affectedBy(path);
    gNodes.selectAll('g.node').each(function(p){
      const card=this.querySelector('.fcard'); if(!card) return;
      card.classList.remove('epicenter','atrisk','faded');
      const rp=p.cell.path;
      if(rp===path) card.classList.add('epicenter');
      else if(aff.has(rp)) card.classList.add('atrisk');
      else card.classList.add('faded');
    });
    // Draw the dependency chain that would break (import direction: affected file → the file it depends on)
    gBlast.selectAll('*').remove();
    const inChain=p=>aff.has(p)||p===path;
    for(const [t,froms] of depMap){ if(!inChain(t)) continue;
      const b=posByPath.get(t); if(!b) continue;
      for(const f of froms){ if(!aff.has(f)) continue;
        const a=posByPath.get(f); if(!a) continue;
        gBlast.append('path').attr('class','blastline').attr('d',`M${a.x},${a.y} L${b.x},${b.y}`); } }
    const name=path.split('/').pop();
    const el=document.getElementById('blast');
    el.textContent = aff.size
      ? `Edit ${name} → hits ${aff.size} files (the orange ones)`
      : `Edit ${name} → nothing imports it, relatively safe to change`;
    el.classList.add('on');
  }
  function clearBlast(){
    gNodes.selectAll('g.node').each(function(){
      const card=this.querySelector('.fcard'); if(card) card.classList.remove('epicenter','atrisk','faded'); });
    gBlast.selectAll('*').remove();
    document.getElementById('blast').classList.remove('on');
  }

  // Don't cram the whole tree into one screen (it would shrink tiles past visibility).
  // Scale on width alone, clamped to a readable range, with the camera anchored at the trunk base (the newest/core tier); scroll up to see higher tiers.
  const MIN_SCALE = 0.62, MAX_SCALE = 1.0;
  function fitToView(){
    if(!lastPlaced || !lastPlaced.length) return;
    const xs=lastPlaced.map(p=>p.x);
    const x0=Math.min(...xs)-CARD_W/2, x1=Math.max(...xs)+CARD_W/2;
    const yMax=Math.max(...lastPlaced.map(p=>p.y))+CARD_H/2+90; // Includes the seed origin stretch
    if(![x0,x1,yMax].every(Number.isFinite)) return;
    const pad=70;
    const bw=Math.max(1,(x1-x0))+pad*2;
    const w=innerWidth||1280, h=innerHeight||800;
    let s=Math.max(MIN_SCALE, Math.min(MAX_SCALE, w/bw));
    if(!Number.isFinite(s) || s<=0) s=1; curScale=s;
    const cx=(x0+x1)/2;
    // Center horizontally on the trunk; vertically place the trunk base near the bottom edge, with tiers of tiles growing upward
    const t=d3.zoomIdentity.translate(w/2 - s*cx, h - s*yMax - 70).scale(s);
    svg.call(zoom.transform, t);
    repaintCards();
  }

  function centerOn(path){
    const p=posByPath.get(path); if(!p) return;
    const w=innerWidth,h=innerHeight, s=Math.max(curScale,0.8);
    const t=d3.zoomIdentity.translate(w/2 - s*p.x, h/2 - s*p.y).scale(s);
    svg.transition().duration(1000).call(zoom.transform,t);
  }

  // ── Switch glow ball: as work moves from the previous tile to this one, the ball travels along the "line" ──
  // This is what the "development process" looks like flowing across the structure: tile=file, line=relation between files.
  // Two tiles with a direct import link → go straight (that's the real relation line);
  // none → flow along the tree skeleton (branch → trunk → another branch), dashed to show it's a cross-structure switch.
  function hasEdge(p,q){
    return (depMap.get(p) && depMap.get(p).has(q)) || (depMap.get(q) && depMap.get(q).has(p));
  }
  function flowRoute(fromPath, toPath){
    const a=posByPath.get(fromPath), b=posByPath.get(toPath);
    if(!a || !b || (a.x===b.x && a.y===b.y)) return null;
    const direct=hasEdge(fromPath, toPath);
    // Straight: just the real relation line between the two tiles
    if(direct) return { d:`M${a.x},${a.y} L${b.x},${b.y}`, direct:true };
    // Along the skeleton: a's branch root is at (0, a.y+74), b's at (0, b.y+74), running the trunk (x=0) in between
    return { d:`M${a.x},${a.y} L0,${a.y+74} L0,${b.y+74} L${b.x},${b.y}`, direct:false };
  }
  function flowBall(fromPath, toPath){
    const r=flowRoute(fromPath, toPath); if(!r) return;
    // 1) Trail line: light up the path just taken, hold briefly, then fade
    const trail=gFlow.append('path').attr('d',r.d).attr('fill','none')
      .attr('stroke','#4dffb0').attr('stroke-width', r.direct?2.4:1.8)
      .attr('stroke-linecap','round').attr('stroke-linejoin','round')
      .attr('stroke-dasharray', r.direct?null:'5 6')
      .attr('stroke-opacity',0).attr('filter','url(#leafglow)');
    trail.transition().duration(160).attr('stroke-opacity', r.direct?.9:.5)
      .transition().delay(360).duration(560).attr('stroke-opacity',0).remove();
    // 2) Glow ball: travels the same path to the new tile, flaring and dispersing on arrival
    const node=trail.node(), L=node.getTotalLength();
    const ball=gFlow.append('circle').attr('r',6)
      .attr('fill','#eafff5').attr('stroke','#4dffb0').attr('stroke-width',2)
      .attr('filter','url(#leafglow)').attr('transform',`translate(${posByPath.get(fromPath).x},${posByPath.get(fromPath).y})`);
    ball.transition().duration(680).ease(d3.easeCubicInOut)
      .attrTween('transform',()=> t => { const p=node.getPointAtLength(L*t); return `translate(${p.x},${p.y})`; })
      .transition().duration(200).attr('r',11).attr('fill-opacity',0).attr('stroke-opacity',0).remove();
  }

  function setActive(path){
    const prev=activePath;
    activePath=path;
    // Trail: record this tile at the front of the recent list (deduped, length-capped) so the focus area stays expanded into cards
    const ri=recent.indexOf(path); if(ri>=0) recent.splice(ri,1);
    recent.unshift(path); if(recent.length>RECENT_KEEP*2) recent.length=RECENT_KEEP*2;
    if(lastCells) { const um=userMoved; userMoved=true; render(lastCells); userMoved=um; } // Redraw the highlight without getting yanked by fit
    if(prev && prev!==path) flowBall(prev, path); // Positions only exist after render, so flow the ball from the previous tile to this one
    centerOn(path);
    const c=cellByPath.get(path);
    const f=document.getElementById('curFile');
    f.textContent=path; f.classList.remove('idle');
    if(c){
      const bits=[`<b>${c.language||''}</b>`, `${c.size_lines||0} lines`];
      if(c.modification_count) bits.push(`edited <b>${c.modification_count}</b>x`);
      if(c.anomaly==='repeat') bits.push('<b style="color:#ff6b81">⚠ Repeated edits</b>');
      document.getElementById('curMeta').innerHTML=bits.join(' · ');
    }
  }

  // ── Enter a tile: view the code that's running ──
  // UI files the browser can render directly → the detail panel gets an extra "Preview" tab
  function isPreviewable(p){ return /\.(html?|svg)$/i.test(p||''); }
  function showCellTab(which){
    const code=document.getElementById('cellcode'), prev=document.getElementById('cellpreview');
    const tc=document.getElementById('tabCode'), tp=document.getElementById('tabPrev');
    if(which==='preview'){
      code.hidden=true; prev.hidden=false; tc.classList.remove('on'); tp.classList.add('on');
      if(prev.dataset.path) prev.src='/preview/'+prev.dataset.path.split('/').map(encodeURIComponent).join('/');
    } else {
      prev.hidden=true; code.hidden=false; tp.classList.remove('on'); tc.classList.add('on');
    }
  }
  async function openCell(path){
    const c=cellByPath.get(path);
    document.getElementById('cellPath').textContent=path;
    document.getElementById('cellStat').textContent = c ? `${c.language||''} · ${c.size_lines||0} lines` : '';
    const pre=document.getElementById('cellcode'); pre.textContent='Loading…';
    const prev=document.getElementById('cellpreview'); prev.removeAttribute('src'); prev.dataset.path=path;
    document.getElementById('tabPrev').hidden=!isPreviewable(path);
    showCellTab('code'); // Default to the code view on every open
    document.getElementById('cell').classList.add('show');
    try{
      const r=await fetch('/file?path='+encodeURIComponent(path));
      const txt=await r.text();
      pre.textContent=txt;
    }catch(e){ pre.textContent='Could not read: '+e.message; }
  }
  document.getElementById('tabCode').onclick=()=>showCellTab('code');
  document.getElementById('tabPrev').onclick=()=>showCellTab('preview');
  document.getElementById('cellBack').onclick=()=>document.getElementById('cell').classList.remove('show');
  addEventListener('keydown',e=>{ if(e.key==='Escape') document.getElementById('cell').classList.remove('show'); });

  // ── WebSocket ──
  let lastCells=null;
  let socket=null;            // WS connection; keep the send pipe on standby, the view itself only watches
  function send(obj){ if(socket && socket.readyState===1) socket.send(JSON.stringify(obj)); }
  function connect(){
    const ws=new WebSocket(`ws://localhost:${WS_PORT}`);
    socket=ws;
    const conn=document.getElementById('conn');
    ws.onopen=()=>{ conn.classList.add('on'); document.getElementById('connText').textContent='Connected'; };
    ws.onclose=()=>{ conn.classList.remove('on'); document.getElementById('connText').textContent='Disconnected, reconnecting…'; setTimeout(connect,1500); };
    ws.onmessage=ev=>{
      let m; try{ m=JSON.parse(ev.data);}catch{ return; }
      if(m.type==='state'){
        if(m.payload && m.payload.root){ const r=m.payload.root.split('/').filter(Boolean); projectName=r[r.length-1]||'Project'; }
        lastCells=(m.payload&&m.payload.cells)||[]; render(lastCells, (m.payload&&m.payload.edges)||lastEdges);
      }
      else if(m.type==='active' && m.payload) setActive(m.payload.path);
      else if(m.type==='activity' && m.payload && m.payload.action!=='read'){
        contentByPath.delete(m.payload.path);   // File changed, so make that tile re-fetch the latest code
        setActive(m.payload.path);
      }
    };
  }
  connect();

  addEventListener('resize',()=>{ if(lastPlaced && !userMoved) fitToView(); });
  </script>
</body>
</html>
