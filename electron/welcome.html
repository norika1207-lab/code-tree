<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<style>
  html,body{height:100%;margin:0;background:#060a12;color:#eaf1fb;
    font-family:-apple-system,"PingFang TC",system-ui,sans-serif;overflow:hidden;}
  .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    background:radial-gradient(900px 600px at 50% 20%,#122138 0%,rgba(18,33,56,0) 60%),#060a12;}
  .dot{width:13px;height:13px;border-radius:50%;background:#4dffb0;box-shadow:0 0 22px #4dffb0;
    animation:beat 1.6s ease-in-out infinite;}
  @keyframes beat{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.6)}}
  h1{font-size:22px;font-weight:650;letter-spacing:1px;margin:0;}
  p{color:#9fb0c6;font-size:13px;margin:0;}
</style></head>
<body><div class="wrap">
  <div class="dot"></div>
  <h1>Code Tree</h1>
  <p>Growing the world-tree…</p>
</div></body></html>
